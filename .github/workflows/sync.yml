name: 同步诗与星演出日历

on:
  schedule:
    # 每天凌晨2点（北京时间10点）自动执行
    - cron: '0 18 * * *'
  workflow_dispatch:  # 允许手动触发
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests
      
      - name: 同步演出数据
        run: python sync_calendar.py
      
      - name: 提交更新
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "同步演出数据 $(date +'%Y-%m-%d')"
          file_pattern: "calendar.ics"
